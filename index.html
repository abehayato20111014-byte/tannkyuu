    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-sidebar: #2d2d2d;
            --text-main: #cccccc;
            --text-light: #ffffff;
            --accent: #007acc;
            --border: #3c3c3c;
            --highlight: #264f78;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Meiryo, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        header { height: 45px; background-color: #333; display: flex; align-items: center; padding: 0 20px; font-weight: bold; color: #fff; border-bottom: 1px solid #000; justify-content: space-between; }
        
        #workspace { display: flex; flex: 1; height: calc(100vh - 45px); }
        
        /* === 左側：辞書＆文法検索サイドバー === */
        #sidebar { width: 340px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 15px; font-size: 14px; font-weight: bold; background: var(--bg-panel); border-bottom: 1px solid var(--border); color: #9cdcfe; }
        .search-box-container { padding: 15px; border-bottom: 1px solid var(--border); background: #252526; }
        #search-input { width: 100%; padding: 10px 12px; background: #3c3c3c; border: 1px solid #555; color: #fff; border-radius: 4px; outline: none; font-size: 14px; }
        #search-input:focus { border-color: var(--accent); }
        #search-results { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; line-height: 1.5; }
        
        .result-item { background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 12px; border-left: 3px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s; }
        .result-item:hover { background-color: #333; transform: translateY(-2px); }
        .result-item.syntax-type { border-left-color: #d7ba7d; }
        
        .result-tag { color: #569cd6; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .syntax-tag { color: #d7ba7d; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .result-primary { color: #4fc1ff; font-weight: bold; font-size: 15px; }
        .result-synonyms { color: #9cdcfe; margin-top: 6px; font-size: 12px; word-break: break-all; }
        .result-example { color: #ce9178; font-family: 'Consolas', monospace; margin-top: 8px; background: #2d2d2d; padding: 5px; border-radius: 3px; font-size: 12px; }
        .result-desc { color: #aaa; font-size: 12px; margin-top: 6px; }

        .category-header { background-color: #333; color: #d7ba7d; padding: 10px 12px; margin-top: 5px; margin-bottom: 5px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .category-header:hover { background-color: #444; }

        /* === 右側：エディタ＆プレビュー === */
        #main-area { display: flex; flex: 1; }
        
        #editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .pane-title { background: var(--bg-panel); padding: 10px 15px; font-size: 13px; color: #d7ba7d; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #washin-editor { flex: 1; background-color: var(--bg-dark); color: #d4d4d4; padding: 15px; font-size: 16px; font-family: 'Consolas', 'Courier New', monospace; border: none; outline: none; resize: none; line-height: 1.6; }
        
        #preview-pane { width: 50%; display: flex; flex-direction: column; background: #fff; }
        #preview-frame { flex: 1; width: 100%; border: none; background-color: #fff; }

        .status-dot { height: 8px; width: 8px; background-color: #89d185; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.typing { background-color: #cca700; }

        /* === UI用追加スタイル === */
        .action-btn { background-color: #2d2d2d; color: #ccc; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { background-color: #444; color: #fff; }
        
        /* === モーダル === */
        #main-modal, #publish-modal, #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-panel); max-width: 1000px; margin: 0 auto; border-radius: 8px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .grammar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .grammar-card { background: var(--bg-dark); padding: 15px; border-radius: 6px; border-left: 4px solid #d7ba7d; }
        
        .input-field { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid var(--border); background: #1e1e1e; color: #fff; font-size: 14px; }
        .input-field:focus { border-color: var(--accent); outline: none; }
        .preview-mini-frame { width: 100%; height: 250px; border: 1px solid #555; background: #fff; border-radius: 4px; margin: 15px 0; }
        .loader-text { color: #10b981; font-weight: bold; font-size: 16px; text-align: center; margin: 20px 0; display: none; }
        .success-box { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; padding: 15px; border-radius: 6px; margin-top: 15px; text-align: center; }
        .error-box { background: rgba(248, 113, 113, 0.2); border: 1px solid #f87171; padding: 15px; border-radius: 6px; margin-top: 15px; color: #f87171; text-align: center; display: none; }
    </style>

                if (item.tag && !item.hidden.includes(item.tag) && !item.tag.includes('!')) {
                    item.hidden.push(item.tag);
                }

                const allWords = [item.primary, item.kidsPrimary, ...item.synonyms];
                allWords.forEach(w => { if(w) wordToTag[type][w] = item.tag; });
                item.hidden.forEach(h => autoCompleteMap[h] = item.primary);
                
                searchIndex.push({

                    tag: item.tag,
                    primary: item.primary,
                    kidsPrimary: item.kidsPrimary,
                    synonyms: item.synonyms,
                    hidden: item.hidden,
                    desc: item.desc,
                    kidsDesc: item.kidsDesc,

                searchResults.appendChild(renderResultItem(res));
            });

        // ==========================================
        // V9 パーサーエンジン
        // ==========================================
        class WashinParserV9 {
            constructor() { this.stack = []; }
            findMatch(dict, text) {
                // 英語のタグ名 (h1, p, divなど) が行の先頭にある場合、それを最優先で拾う（誤爆を防ぎつつ英語に反応する）
                const engMatch = text.match(/^[a-zA-Z0-9\-]+/);
                if (engMatch && Object.values(dict).includes(engMatch[0].toLowerCase())) {
                    return engMatch[0].toLowerCase();
                }

                // 日本語でのマッチ（長い単語から順に検索）
                const keys = Object.keys(dict).sort((a, b) => b.length - a.length);
                for (const jp of keys) { if (text.includes(jp)) return dict[jp]; }
                
                // フォールバック（未知の英字タグ等）
                return engMatch ? engMatch[0].toLowerCase() : null;
            }
            parse(source) {
                let output = ''; this.stack = []; let mode = 'html';
                const lines = source.split('\n');
                for (let line of lines) {
                    if (line.trim() === '') continue;
                    const indent = line.match(/^([　\s]*)/)[1].replace(/　/g, '  ').replace(/\t/g, '  ').length / 2;
                    let content = line.trim();

                    // HTML直書きのパススルー（<h1>や<p>などをHTMLのまま書いた場合もそのまま反応させる）
                    if (mode === 'html' && content.startsWith('<') && content.endsWith('>')) {
                        output += `${'  '.repeat(indent)}${content}\n`;
                        continue;
                    }

                    if (content.match(/の終了$/) || content === '終了') {
                        if (this.stack.length > 0) {
                            const popped = this.stack.pop();
                            output += `${'  '.repeat(popped.depth)}</${popped.tag}>\n`;
                            if (popped.tag === 'style' || popped.tag === 'script') mode = 'html';
                        }
                        continue;
                    }

                    while (this.stack.length > 0 && this.stack[this.stack.length - 1].depth >= indent) {
                        if (this.stack[this.stack.length - 1].isExplicit) break;
                        const popped = this.stack.pop();
                        output += `${'  '.repeat(popped.depth)}</${popped.tag}>\n`;
                        if (popped.tag === 'style' || popped.tag === 'script') mode = 'html';
                    }

                    let isExplicit = content.match(/の開始$/);
                    if (isExplicit) content = content.replace(/の開始$/, '').trim();

                    const base = '  '.repeat(indent);
                    if (mode === 'html') {
                        let tag = this.findMatch(wordToTag.html, content) || 'div';
                        let text = content.includes('：') ? content.split(/[：:]/)[1].trim() : '';
                        let attrs = (content.match(/【(.*?)】/) || [])[1] ? (content.match(/【(.*?)】/)[1].match(/^[a-zA-Z]/) ? ` id="${content.match(/【(.*?)】/)[1]}"` : ` class="${content.match(/【(.*?)】/)[1]}"`) : '';
                        
                        if (tag === 'style') { mode = 'css'; isExplicit = true; }
                        if (tag === 'script') { mode = 'js'; isExplicit = true; }

                        if (tag.startsWith('!')) output += `<${tag}>\n`;
                        else if (!isExplicit && text) output += `${base}<${tag}${attrs}>${text}</${tag}>\n`;
                        else {
                            output += `${base}<${tag}${attrs}>\n`;
                            this.stack.push({ tag, depth: indent, isExplicit });
                            if (text) output += `${base}  ${text}\n`;
                        }
                    } else if (mode === 'css') {
                        if (content.includes('：') || content.includes(':')) {
                            const p = content.split(/[：:]/);
                            output += `${base}${this.findMatch(wordToTag.css, p[0]) || p[0]}: ${p[1]};\n`;
                        } else output += `${base}${content}\n`;
                    } else if (mode === 'js') {
                        let jsL = content;
                        Object.keys(wordToTag.js).sort((a,b)=>b.length-a.length).forEach(k => {
                            if (jsL.includes(k)) jsL = jsL.split(k).join(wordToTag.js[k] + (wordToTag.js[k].match(/[a-zA-Z]$/) ? ' ' : ''));
                        });
                        jsL = jsL.replace(/（/g, '(').replace(/）/g, ')').replace(/「|『/g, '"').replace(/」|』/g, '"').replace(/[：:]/g, ' = ');
                        output += `${base}${jsL};\n`;
                    }
                }
                while (this.stack.length > 0) { const p = this.stack.pop(); output += `${'  '.repeat(p.depth)}</${p.tag}>\n`; }
                return output;
            }
        }

        // ==========================================
        // エディタ制御 & 別タブ全画面プレビュー機能
        // ==========================================
        const editor = document.getElementById('washin-editor');
        const previewFrame = document.getElementById('preview-frame');
        const statusIndicator = document.getElementById('status-indicator');
        const fullscreenPreviewBtn = document.getElementById('fullscreen-preview-btn');
        const parser = new WashinParserV9();
        let typingTimer;

        function compile() {
            const compiled = parser.parse(editor.value);
            previewFrame.srcdoc = compiled;
            statusIndicator.classList.remove('typing');
            statusIndicator.style.backgroundColor = '#89d185';
            statusIndicator.nextSibling.textContent = isKidsMode ? '同期完了' : '同期完了';
        }

        fullscreenPreviewBtn.addEventListener('click', () => {
            const compiled = parser.parse(editor.value);
            const newWindow = window.open('', '_blank');
            if (newWindow) {
                newWindow.document.open();
                newWindow.document.write(compiled);
                newWindow.document.close();
            } else {
                alert(isKidsMode ? 'ポップアップがブロックされているみたい。ブラウザのせっていをかくにんしてね。' : 'ポップアップがブロックされました。ブラウザの設定を確認してください。');
            }
        });

        // ----------------------------------------------------
        // ▼ ここから Firebase Realtime Database 連携の追加実装 ▼
        // ----------------------------------------------------
        const publishBtn = document.getElementById('publish-btn');
        const publishModal = document.getElementById('publish-modal');
        const closePublishBtn = document.getElementById('close-publish-btn');
        const executePublishBtn = document.getElementById('execute-publish-btn');
        const publishTitle = document.getElementById('publish-title');
        const publishDesc = document.getElementById('publish-desc');
        const publishLoader = document.getElementById('publish-loader');
        const publishError = document.getElementById('publish-error');
        const publishSuccess = document.getElementById('publish-success');
        const publishIdResult = document.getElementById('publish-id-result');
        const copyIdBtn = document.getElementById('copy-id-btn');

        const searchBtn = document.getElementById('search-btn');
        const searchModal = document.getElementById('search-modal');
        const closeSearchBtn = document.getElementById('close-search-btn');
        const executeSearchBtn = document.getElementById('execute-search-btn');
        const searchIdInput = document.getElementById('search-id-input');
        const searchLoader = document.getElementById('search-loader');
        const searchError = document.getElementById('search-error');
        const searchResultArea = document.getElementById('search-result-area');
        const searchResultTitle = document.getElementById('search-result-title');
        const searchResultDesc = document.getElementById('search-result-desc');
        const searchPreviewFrame = document.getElementById('search-preview-frame');
        const loadCodeBtn = document.getElementById('load-code-btn');

        let loadedCodeBuffer = "";

        // モーダルの開閉制御
        publishBtn.addEventListener('click', () => {
            publishModal.style.display = 'block';
            publishSuccess.style.display = 'none';
            publishError.style.display = 'none';
            executePublishBtn.style.display = 'block';
        });
        closePublishBtn.addEventListener('click', () => publishModal.style.display = 'none');

        searchBtn.addEventListener('click', () => {
            searchModal.style.display = 'block';
            searchResultArea.style.display = 'none';
            searchError.style.display = 'none';
            searchIdInput.value = '';
        });
        closeSearchBtn.addEventListener('click', () => searchModal.style.display = 'none');

        publishModal.addEventListener('click', (e) => { if (e.target === publishModal) publishModal.style.display = 'none'; });
        searchModal.addEventListener('click', (e) => { if (e.target === searchModal) searchModal.style.display = 'none'; });

        // ランダムID生成器 (a-z, 0-9の6文字)
        function generateProjectId() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        // Firebase への保存（公開）処理
        executePublishBtn.addEventListener('click', async () => {
            const title = publishTitle.value.trim();
            const desc = publishDesc.value.trim();
            const code = editor.value;

            if (!title) {
                showPublishError(isKidsMode ? "作品のなまえをいれてね！" : "作品名を入力してください。");
                return;
            }

            publishLoader.style.display = 'block';
            publishError.style.display = 'none';
            executePublishBtn.style.display = 'none';

            try {
                const projectId = generateProjectId();
                
                // 動的インポートを利用してグローバルに展開されたモジュールのメソッドを呼び出す想定
                // 実際にはFirebase SDKが正しくセットアップされている必要があります
                if (typeof window.__firebase_set !== 'undefined') {
                     await window.__firebase_set(window.__firebase_ref(window.__firebase_db, 'projects/' + projectId), {
                        title: title,
                        desc: desc,
                        code: code,
                        createdAt: Date.now()
                    });
                } else {
                     throw new Error("データベースの準備ができていないみたい。");
                }

                publishLoader.style.display = 'none';
                publishSuccess.style.display = 'block';
                publishIdResult.value = projectId;

            } catch (err) {
                publishLoader.style.display = 'none';
                executePublishBtn.style.display = 'block';
                showPublishError((isKidsMode ? "通信にしっぱいしたよ。<br><small>" : "通信に失敗しました。<br><small>") + err.message + "</small>");
            }
        });

        copyIdBtn.addEventListener('click', () => {
            publishIdResult.select();
            document.execCommand('copy');
            copyIdBtn.innerText = isKidsMode ? "コピーしたよ！" : "コピーしました";
            setTimeout(() => { copyIdBtn.innerText = "コピーする"; }, 2000);
        });

        function showPublishError(msg) {
            publishError.innerHTML = msg;
            publishError.style.display = 'block';
        }

        // Firebase からの読み込み（探す）処理
        executeSearchBtn.addEventListener('click', async () => {
            const projectId = searchIdInput.value.trim();
            if (!projectId) {
                showSearchError(isKidsMode ? "IDを入力してね！" : "IDを入力してください。");
                return;
            }

            searchLoader.style.display = 'block';
            searchError.style.display = 'none';
            searchResultArea.style.display = 'none';

            try {
                 if (typeof window.__firebase_get !== 'undefined') {
                    const snapshot = await window.__firebase_get(window.__firebase_child(window.__firebase_ref(window.__firebase_db), `projects/${projectId}`));
                    if (!snapshot.exists()) {
                        throw new Error(isKidsMode ? "みつからなかったよ。IDがまちがっていないかたしかめてね！" : "見つかりませんでした。IDを確認してください。");
                    }
                    
                    const data = snapshot.val();
                    searchResultTitle.innerText = data.title || (isKidsMode ? "名無しの作品" : "無題の作品");
                    searchResultDesc.innerText = data.desc || (isKidsMode ? "説明はないみたい。" : "説明はありません。");
                    loadedCodeBuffer = data.code || "";

                    const compiled = parser.parse(loadedCodeBuffer);
                    searchPreviewFrame.srcdoc = compiled;

                    searchLoader.style.display = 'none';
                    searchResultArea.style.display = 'block';
                 } else {
                     throw new Error("データベースの準備ができていないみたい。");
                 }
            } catch (err) {
                searchLoader.style.display = 'none';
                showSearchError(err.message);
            }
        });

        function showSearchError(msg) {
            searchError.innerHTML = msg;
            searchError.style.display = 'block';
        }

        loadCodeBtn.addEventListener('click', () => {
            editor.value = loadedCodeBuffer;
            compile();
            searchModal.style.display = 'none';
            statusIndicator.nextSibling.textContent = isKidsMode ? 'よみこみ完了' : '読込完了';
            statusIndicator.style.backgroundColor = '#89d185';
        });

        // キーボード・入力制御
        editor.addEventListener('keydown', function(e) {
            if (e.isComposing || e.keyCode === 229) return; 
            if (e.key === 'Enter') {
                const pos = this.selectionStart;
                const before = this.value.substring(0, pos);
                const after = this.value.substring(pos);
                // h1やpなどの英語タグ（数字含む）に反応させるため正規表現を微調整
                const match = before.match(/[a-zA-Z0-9\-]+$/);
                if (match && autoCompleteMap[match[0].toLowerCase()]) {
                    e.preventDefault();
                    // モードに応じて補完する日本語を切り替える
                    let word = autoCompleteMap[match[0].toLowerCase()];
                    if (isKidsMode) {
                        // 低学年モードの場合は専用のやさしい言葉に変換
                        const foundItem = WashinDictionaryData.html.concat(WashinDictionaryData.css, WashinDictionaryData.js)
                            .find(item => item.primary === word);
                        if (foundItem && foundItem.kidsPrimary) {
                            word = foundItem.kidsPrimary;
                        }
                    }
                    this.value = before.substring(0, match.index) + word + '\n' + after;
                    this.selectionStart = this.selectionEnd = match.index + word.length + 1;
                    compile();
                }
            }
        });

        editor.addEventListener('input', () => {
            statusIndicator.classList.add('typing');
            statusIndicator.style.backgroundColor = '#cca700';
            statusIndicator.nextSibling.textContent = isKidsMode ? '入力中...' : '入力中...';
            clearTimeout(typingTimer);
            typingTimer = setTimeout(compile, 200); 
        });

        window.onload = () => {
            editor.value = defaultCodeNormal;
            compile();
        };
    </script>
